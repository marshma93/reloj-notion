<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reloj</title>
<style>
  /* ============================================================
     ZONA DE PERSONALIZACIÓN
     ============================================================ */
  :root{
    /* FONDO: por defecto imita el modo OSCURO de Notion (#191919),
       así el bloque se funde con la página y NO se ve blanco.
         - Si tu página está en claro:  usa  #ffffff
         - Si de verdad lo quieres sin fondo: usa  transparent
           (aviso: en muchos embeds de Notion eso se ve blanco). */
    --bg:     #191919;

    --fg:     #f4f3ee;   /* color de la HORA                 */
    --muted:  #9a9ba2;   /* color de ETIQUETA y FECHA        */
    --accent: #ff5c5c;   /* punto rojo "en directo"          */
    --font:   ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  /* Tamaños: cambia los clamp() de #time y #date (mínimo, escalado, máximo). */
  /* ============================================================ */

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);        /* imita el fondo de Notion -> sin blanco */
    font-family:var(--font);
    -webkit-font-smoothing:antialiased;
  }

  .clock{ text-align:center; line-height:1; }

  .label{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    color:var(--muted);
    font-size:.7rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    margin-bottom:clamp(10px, 3vw, 16px);
  }

  .dot{
    width:7px; height:7px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 8px var(--accent);
    animation:pulse 1.6s ease-in-out infinite;
  }

  #time{
    color:var(--fg);
    font-size:clamp(2.4rem, 9vw, 4rem);
    font-weight:500;
    letter-spacing:-.01em;
    font-variant-numeric:tabular-nums;
  }

  #date{
    color:var(--muted);
    font-size:clamp(.7rem, 2vw, .8rem);
    margin-top:clamp(10px, 3vw, 16px);
  }

  @keyframes pulse{
    0%,100%{ opacity:1;   transform:scale(1);   }
    50%    { opacity:.35; transform:scale(.82); }
  }

  @media (prefers-reduced-motion: reduce){
    .dot{ animation:none; }
  }
</style>
</head>
<body>
  <div class="clock">
    <div class="label"><span class="dot"></span><span id="label"></span></div>
    <div id="time">--:--:--</div>
    <div id="date">—</div>
  </div>

<script>
  /* ====== AJUSTES ====== */
  const ETIQUETA = "BARCELONA";      // texto de arriba (o "" para quitarlo)
  const ZONA     = "Europe/Madrid";  // zona horaria fija
  /* ===================== */

  document.getElementById("label").textContent = ETIQUETA;

  function actualizar(){
    const ahora = new Date();

    const hora = ahora.toLocaleTimeString("es-ES", {
      timeZone: ZONA, hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
    });

    let fecha = ahora.toLocaleDateString("es-ES", {
      timeZone: ZONA, weekday: "long", day: "numeric", month: "long", year: "numeric"
    });
    fecha = fecha.charAt(0).toUpperCase() + fecha.slice(1);

    document.getElementById("time").textContent = hora;
    document.getElementById("date").textContent = fecha;
  }

  actualizar();
  setInterval(actualizar, 1000);
</script>
</body>
</html>
