<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta — 80 kg</title>
<style>
  /* ============================================================
     ZONA DE PERSONALIZACIÓN
     ============================================================ */
  :root{
    --bg:     #191919;
    --fg:     #f4f3ee;
    --muted:  #9a9ba2;
    --accent: #ff5c5c;                 /* subrayado al editar el peso */
    --track:  rgba(255,255,255,.10);   /* fondo de la barra           */
    --fill:   #f4f3ee;                 /* relleno de la barra         */
    --font:   ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  /* ============================================================ */

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:flex-start;
    background:var(--bg);
    font-family:var(--font);
    -webkit-font-smoothing:antialiased;
  }

  .w{ width:min(320px, 82vw); line-height:1; }

  .label{
    color:var(--muted);
    font-size:.7rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    margin-bottom:clamp(12px, 3vw, 18px);
  }

  .row{
    display:flex; align-items:baseline; gap:.3em;
    color:var(--fg);
    font-size:clamp(2rem, 7vw, 3rem);
    font-weight:500;
    font-variant-numeric:tabular-nums;
    margin-bottom:clamp(12px, 3vw, 18px);
  }
  #peso{
    width:2.7em;
    background:transparent; border:none; padding:0;
    color:var(--fg); font:inherit; text-align:left; outline:none;
    border-bottom:1px dashed rgba(255,255,255,.22);
  }
  #peso:focus{ border-bottom-color:var(--accent); }
  #peso::-webkit-outer-spin-button,
  #peso::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  .row .u{ font-size:.42em; color:var(--muted); }

  .bar{ height:8px; border-radius:99px; background:var(--track); overflow:hidden; }
  .fill{ height:100%; width:0; background:var(--fill); border-radius:99px; transition:width .4s ease; }

  .sub{
    color:var(--muted);
    font-size:clamp(.7rem, 2vw, .8rem);
    margin-top:clamp(10px, 3vw, 14px);
  }
</style>
</head>
<body>
  <div class="w">
    <div class="label" id="label">META · 80 KG</div>
    <div class="row"><input id="peso" type="number" step="0.1" inputmode="decimal"><span class="u">kg</span></div>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="sub" id="sub">—</div>
  </div>

<script>
  /* ====== AJUSTES ====== */
  const PESO_INICIAL = 92;            // punto de partida
  const PESO_META    = 80;            // objetivo
  const PESO_DEFECTO = 92;            // valor mostrado si aún no has guardado nada
  const FECHA_META   = "2026-09-16";
  const ETIQUETA     = "META · 80 KG";
  /* ===================== */

  const input = document.getElementById("peso");
  document.getElementById("label").textContent = ETIQUETA;

  // Recupera el último peso guardado en ESTE navegador
  let guardado = null;
  try { guardado = localStorage.getItem("peso_actual"); } catch(e){}
  input.value = (guardado !== null) ? guardado : PESO_DEFECTO;

  function actualizar(){
    const actual = parseFloat(input.value);
    let pct = (PESO_INICIAL - actual) / (PESO_INICIAL - PESO_META) * 100;
    if(isNaN(pct)) pct = 0;
    pct = Math.max(0, Math.min(100, pct));
    document.getElementById("fill").style.width = pct.toFixed(0) + "%";

    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const meta = new Date(FECHA_META + "T00:00:00");
    const dias = Math.max(0, Math.round((meta - hoy) / 86400000));
    const faltan = isNaN(actual) ? 0 : Math.max(0, actual - PESO_META);
    const fCorta = meta.toLocaleDateString("es-ES", {day:"numeric", month:"short"});

    document.getElementById("sub").textContent =
      "Faltan " + faltan.toFixed(1).replace(/\.0$/, "") + " kg · " + dias + " días (" + fCorta + ")";
  }

  input.addEventListener("input", actualizar);
  input.addEventListener("change", () => {
    try { localStorage.setItem("peso_actual", input.value); } catch(e){}
  });

  actualizar();
</script>
</body>
</html>
